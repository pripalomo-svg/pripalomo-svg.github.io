<body>

    <img src="assets/logo.svg" alt="Priscila Palomo Psicologia">

</nav>

<div class="article-wrap">
  <a href="blog.html" class="back-link">← Blog</a>

  <div class="article-header">
    <span class="tag" id="art-tag" style="display:none"></span>
    <h1 id="art-titulo">Carregando…</h1>
    <div class="article-meta" id="art-meta"></div>
  </div>

  <div class="article-body" id="art-conteudo">
    <p style="color:#999">Carregando…</p>
  </div>

  <div class="article-footer">
    <a href="https://wa.me/5511950690537?text=Ol%C3%A1%20Priscila!" target="_blank" class="btn btn-solid">Falar comigo</a>
  </div>
</div>

<footer>
  <span class="foot-name">Priscila Palomo</span>
  <div class="foot-links">
    <a href="blog.html">Blog</a>
  </div>
  <span class="foot-info">CRP 98007</span>
</footer>

<script src="assets/app.js"></script>
<script src="assets/content.js"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const slug = (params.get('p')||'').replace(/[^a-z0-9\-_]/gi,'');
  const elT = document.getElementById('art-titulo');
  const elM = document.getElementById('art-meta');
  const elTag = document.getElementById('art-tag');
  const elC = document.getElementById('art-conteudo');

  if(!slug){
    elT.textContent = 'Artigo não encontrado';
    elC.innerHTML = '<p><a href="blog.html">← Voltar ao blog</a></p>';
    return;
  }

  try{
    const texto = await lerArquivo('posts/'+slug+'.md');
    const { meta, corpo } = lerFrontMatter(texto);
    const titulo = meta.titulo || slug;

    document.title = titulo + ' — Priscila Palomo';
    document.querySelector('meta[name="description"]').content = (meta.resumo || resumoDe(corpo, 120));
    elT.textContent = titulo;
    if(meta.tag){ elTag.textContent = meta.tag; elTag.style.display='inline-block'; }
    const partes = [];
    if(meta.data) partes.push(formatarData(meta.data));
    partes.push(tempoLeitura(corpo) + ' min de leitura');
    elM.textContent = partes.join(' · ');
    elC.innerHTML = md2html(corpo);
  }catch(e){
    elT.textContent = 'Artigo não encontrado';
    elC.innerHTML = '<p><a href="blog.html">← Voltar ao blog</a></p>';
  }
})();
</script>
</body>
</html>
