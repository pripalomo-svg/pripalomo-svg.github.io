<main class="wrap">
  <div class="masthead">
    <div class="masthead-name">Blog</div>

    <a href="loja.html">Materiais</a>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="assets/app.js"></script>
<script src="assets/content.js"></script>
<script>
(async function(){
  const alvo = document.getElementById('lista-posts');
  try{
    const arquivos = await listarMarkdown('posts');
    const posts = await Promise.all(arquivos.map(async a => {
      const { meta, corpo } = lerFrontMatter(await lerArquivo(a.path));
      return {
        slug: a.slug,
        titulo: meta.titulo || a.slug,
        data: meta.data || '',
        tag: meta.tag || '',
        resumo: meta.resumo || resumoDe(corpo),
        leitura: tempoLeitura(corpo)
      };
    }));
    posts.sort((x,y) => (y.data||'').localeCompare(x.data||''));

    if(!posts.length){
      alvo.innerHTML = '<p style="padding:32px 0;color:#999;font-size:14px">Nenhum artigo ainda.</p>';
      return;
    }

    alvo.innerHTML = posts.map(p => `
      <a href="post.html?p=${encodeURIComponent(p.slug)}" class="post-row">
        <div class="post-date">${formatarData(p.data)||'—'}</div>
        <div class="post-info">
          ${p.tag ? `<span class="post-tag">${escapeHtml(p.tag)}</span>` : ''}
          <h3>${escapeHtml(p.titulo)}</h3>
          <p>${escapeHtml(p.resumo)}</p>
        </div>
      </a>`).join('');

  }catch(e){
    alvo.innerHTML = '<p style="padding:32px 0;color:#999;font-size:14px">Não foi possível carregar os artigos. Tente recarregar.</p>';
  }
})();
</script>
</body>
